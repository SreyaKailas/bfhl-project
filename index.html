<!DOCTYPE html>
<html>
<head>
  <title>BFHL Tree Builder</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    textarea {
      width: 300px;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border-radius: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
    }

    pre {
      text-align: left;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

  <h1>BFHL Hierarchy Builder</h1>

  <p>Enter nodes (comma separated)</p>

  <textarea id="input">
A->B, A->C, B->D
  </textarea>

  <br>

  <button onclick="submitData()">Submit</button>

  <pre id="output"></pre>

  <script>
    async function submitData() {
      const raw = document.getElementById("input").value;
      const data = raw.split(",");

      try {
        const res = await fetch("http://localhost:3000/bfhl", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data })
        });

        const json = await res.json();

        document.getElementById("output").innerText =
          JSON.stringify(json, null, 2);

      } catch (err) {
        document.getElementById("output").innerText =
          "Error connecting to backend ";
      }
    }
  </script>

</body>
</html>
